<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" rx="24" fill="#002D62"/>
  <!-- Sam's Club diamond premium logo representation -->
  <g transform="translate(50,50) scale(0.9)">
    <!-- Outer green diamond -->
    <path d="M 0,-40 L 40,0 L 0,40 L -40,0 Z" fill="#00843D" />
    <!-- Inner blue diamond -->
    <path d="M 0,-30 L 30,0 L 0,30 L -30,0 Z" fill="#00A0E9" />
    <path d="M 0,-20 L 20,0 L 0,20 L -20,0 Z" fill="#FFFFFF" opacity="0.9" />
  </g>
</svg>
